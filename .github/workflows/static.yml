name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main", "translation-cn"]
  pull_request:
    branches: ["main", "translation-cn"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: pandoc/actions/setup@main
        with:
          version: 3.7.0.2

      - name: Install pandoc-crossref
        run: |
          CROSSREF_VERSION="0.3.20"
          curl -fsSL "https://github.com/lierdakil/pandoc-crossref/releases/download/v${CROSSREF_VERSION}/pandoc-crossref-Linux-X64.tar.xz" \
            -o pandoc-crossref.tar.xz
          tar -xf pandoc-crossref.tar.xz
          BINARY=$(find . -name "pandoc-crossref" -type f | head -1)
          sudo mv "$BINARY" /usr/local/bin/pandoc-crossref
          pandoc-crossref --version

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            make \
            poppler-utils \
            texlive-latex-extra \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-xetex \
            lmodern

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Clean build directory
        run: |
          rm -rf build
          mkdir -p build/html

      - name: Build book (HTML, PDF, EPUB, Kindle)
        run: |
          make
          make files

      - name: Build teaching slides
        run: |
          uv sync --extra teach
          make teach

      - name: Build Pagefind search index
        run: npx --yes pagefind --site build/html --glob "c/**/*.html"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
